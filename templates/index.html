<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Seller Report Processor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="main-container">

    <div class="dashboard-card">

        <div class="header">
            <h2>📊 Amazon Seller Report Processor</h2>
            <p>Upload your Master File and Amazon Report</p>
        </div>

        <form action="/process" method="POST" enctype="multipart/form-data">

            <div class="upload-section">

                <label class="upload-label">
                    Upload Master File
                </label>

                <div class="drop-zone">
                    <input type="file"
                           name="master_file"
                           accept=".xlsx,.xls,.csv"
                           required>
                </div>

            </div>

            <div class="upload-section">

                <label class="upload-label">
                    Upload Amazon Report
                </label>

                <div class="drop-zone">
                    <input type="file"
                           name="report_file"
                           accept=".xlsx,.xls,.csv"
                           required>
                </div>

            </div>

            <button type="submit" class="process-btn">
                Process Report
            </button>

        </form>

        {% if stats %}

        <div class="results-section">

            <h4>Results</h4>

            <div class="stats-grid">

                <div class="stat-card">
                    <h3>{{ stats.total_rows }}</h3>
                    <p>Total Rows</p>
                </div>

                <div class="stat-card">
                    <h3>{{ stats.matched }}</h3>
                    <p>Matched SKUs</p>
                </div>

                <div class="stat-card">
                    <h3>{{ stats.missing }}</h3>
                    <p>Missing SKUs</p>
                </div>

            </div>

            <a href="/download" class="download-btn">
                Download Excel
            </a>
            <a href="/" class="refresh-btn">
                Process Another File
            </a>

        </div>

        {% endif %}

    </div>

</div>

</body>

</html>
